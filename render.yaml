services:
  - type: web
    name: claude-bridge
    runtime: docker
    dockerfilePath: api/python/Dockerfile
    dockerContext: api/python
    region: oregon
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PYTHON_API_PORT
        value: "8000"
      - key: BRIDGE_SHARED_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
    autoDeploy: true
